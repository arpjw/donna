services:
  postgres:
    image: pgvector/pgvector:pg15
    environment:
      POSTGRES_USER: donna
      POSTGRES_PASSWORD: donna
      POSTGRES_DB: donna
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U donna"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://donna:donna@postgres:5432/donna
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://donna:donna@postgres:5432/donna
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: celery -A workers.celery_app worker --loglevel=info

  beat:
    build: ./backend
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    env_file: .env
    environment:
      DATABASE_URL: postgresql+asyncpg://donna:donna@postgres:5432/donna
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./backend:/app
    command: celery -A workers.celery_app beat --loglevel=info

  frontend:
    build: ./frontend
    ports:
      - "3000:3000"
    env_file: .env
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    command: npm run dev

  flower:
    build: ./backend
    ports:
      - "5555:5555"
    depends_on:
      - redis
    env_file: .env
    environment:
      REDIS_URL: redis://redis:6379/0
    command: celery -A workers.celery_app flower --port=5555 --basic_auth=donna:donna

volumes:
  postgres_data:
